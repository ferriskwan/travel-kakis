<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Your Next Adventure Awaits</h1>
        <p>Fill out the form below to help us craft your perfect getaway.</p>
        <form id="travel-form">
            <div class="form-section">
                <h2>Budget</h2>
                <div class="slider-container">
                    <span>On a Budget</span>
                    <input type="range" min="0" max="1" value="0.5" step="0.1" class="slider" id="budget">
                    <span>Travel in Comfort</span>
                </div>
            </div>

            <div class="form-section">
                <h2>Intention</h2>
                <div class="radio-group">
                    <label><input type="radio" name="intention" value="business"> Business</label>
                    <label><input type="radio" name="intention" value="leisure"> Leisure</label>
                    <label><input type="radio" name="intention" value="both"> Both</label>
                </div>
            </div>

            <div class="form-section">
                <h2>Travel Details</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="duration">Estimated Number of Days</label>
                        <input type="text" id="duration" placeholder="e.g., '2 weeks' or '10-13 days'">
                    </div>
                    <div class="form-group">
                        <label for="adults">Number of Adults</label>
                        <input type="number" id="adults" min="0">
                    </div>
                    <div class="form-group">
                        <label for="children">Number of Children</label>
                        <input type="number" id="children" min="0">
                    </div>
                    <div class="form-group">
                        <label for="elderly">Number of Elderly</label>
                        <input type="number" id="elderly" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="special-needs">Special Needs</label>
                    <textarea id="special-needs" rows="3" placeholder="e.g., wheelchair accessibility, dietary restrictions"></textarea>
                </div>
                <div class="form-group">
                    <label for="from">Travelling From</label>
                    <input type="text" id="from" value="Singapore">
                </div>
            </div>

            <div class="form-section">
                <h2>Preferences</h2>
                <div class="form-group">
                    <label for="lodging">Type of Lodging Preferred</label>
                    <input type="text" id="lodging" placeholder="e.g., Hotel, Airbnb, Resort">
                </div>
                <div class="form-group">
                    <label for="poi">Must-Go Places of Interest</label>
                    <textarea id="poi" rows="5" placeholder="List any destinations you don't want to miss!"></textarea>
                </div>
                <div class="form-group">
                    <label for="other">Other Requirements</label>
                    <textarea id="other" rows="5" placeholder="Anything else we should know?"></textarea>
                </div>
            </div>

            <button type="submit">Generate Itinerary</button>
        </form>

        <div id="itinerary-container" class="itinerary-container" style="display: none;">
            <hr class="section-divider">
            <h2 class="itinerary-title">Your Custom Itinerary</h2>
            <div id="itinerary-content"></div>
        </div>
    </div>

    <div class="floating-box">
        <h3>Request Changes</h3>
        <p>See something you want to change? Let us know here.</p>
        <textarea id="change-request" rows="10" placeholder="e.g., 'Can we switch the flight to a later time?'"></textarea>
        <button type="submit" form="travel-form">Submit Changes</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
